<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>디아4 진매니저 오픈채팅</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --main: #37b275;
      --main-dark: #258c5c;
      --bg: #111827;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Noto Sans KR', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--bg);
      color: #e5e7eb;
      overflow-x: hidden;
    }

    .hero-section {
      position: relative;
      min-height: 62vh;
      background:
        radial-gradient(circle at 50% 20%, rgba(55, 178, 117, 0.22), transparent 38%),
        linear-gradient(to bottom, rgba(55, 178, 117, 0.14), #111827 88%),
        url('https://placehold.co/1920x1080/1a202c/37b275?text=Diablo+IV+OpenChat') no-repeat center center / cover;
    }

    .hero-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(17, 24, 39, 0.72);
      z-index: 0;
    }

    .hero-section::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 160px;
      background: linear-gradient(to bottom, transparent, #111827 75%);
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .btn-hover-effect {
      transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(135deg, var(--main) 0%, var(--main-dark) 100%);
      border: 2px solid rgba(74, 222, 128, 0.2);
      box-shadow: 0 0 0 rgba(55, 178, 117, 0);
    }

    .btn-hover-effect:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 16px 35px -8px rgba(55, 178, 117, 0.62), 0 8px 16px -8px rgba(55, 178, 117, 0.35);
      border-color: #4ade80;
    }

    .btn-hover-effect:active {
      transform: translateY(0) scale(0.99);
    }

    .action-card {
      background: rgba(31, 41, 55, 0.52);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(75, 85, 99, 0.48);
      transition: all 0.28s ease;
      border-radius: 1rem;
    }

    .action-card:hover {
      background: rgba(31, 41, 55, 0.84);
      border-color: var(--main);
      transform: translateY(-5px);
      box-shadow: 0 18px 28px -16px rgba(0, 0, 0, 0.85);
    }

    .action-card:hover .icon-container {
      color: #4ade80;
      transform: scale(1.1) rotate(5deg);
    }

    .icon-container {
      transition: all 0.28s ease;
      color: #9ca3af;
    }

    .text-glow {
      text-shadow: 0 0 12px rgba(55, 178, 117, 0.55);
    }

    @keyframes float-up-down {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .floating-text {
      animation: float-up-down 4s ease-in-out infinite;
      display: inline-flex;
    }

    @keyframes pulse-ring {
      0% { transform: scale(0.92); opacity: 0.85; }
      70% { transform: scale(1.18); opacity: 0; }
      100% { transform: scale(1.18); opacity: 0; }
    }

    .voice-badge {
      position: relative;
    }

    .voice-badge::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 999px;
      border: 1px solid rgba(74, 222, 128, 0.45);
      animation: pulse-ring 2.2s infinite;
    }

    .toast-show {
      opacity: 1 !important;
      transform: translate(-50%, 0) scale(1) !important;
      pointer-events: auto !important;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col">
  <main class="hero-section text-white py-28 px-4 sm:px-6 lg:px-8 flex flex-col items-center justify-center text-center shadow-2xl">
    <div class="hero-content flex flex-col items-center w-full max-w-2xl mx-auto">
      <div class="mb-8 flex items-center justify-center gap-3 bg-black/35 px-6 py-2 rounded-full border border-gray-700/60 backdrop-blur-sm floating-text">
        <i class="fa-solid fa-comment text-green-400 text-xl"></i>
        <span class="text-lg font-medium tracking-widest text-gray-300">KAKAO<span class="font-light opacity-75">OPENCHAT</span></span>
      </div>

      <div class="mb-4 voice-badge inline-flex items-center gap-2 rounded-full border border-green-400/30 bg-green-400/10 px-4 py-2 text-sm text-green-300">
        <i class="fa-solid fa-volume-high"></i>
        <span>네이버 클로바 음성 MP3 안내</span>
      </div>

      <h1 class="text-5xl sm:text-6xl md:text-7xl font-black mb-6 tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-gray-100 to-gray-500 drop-shadow-lg">
        디아4 진매니저
      </h1>

      <p class="text-xl sm:text-2xl font-light mb-12 text-green-400 tracking-wide text-glow">
        1:1 맞춤 상담 및 세팅
      </p>

      <button id="joinButton" class="btn-hover-effect text-white font-bold py-4 px-10 rounded-full text-xl flex items-center gap-3 group w-full sm:w-auto justify-center">
        <i class="fa-brands fa-kickstarter-k text-2xl"></i>
        <span>오픈채팅 입장하기</span>
        <i class="fa-solid fa-chevron-right text-sm opacity-70 group-hover:opacity-100 group-hover:translate-x-1 transition-transform"></i>
      </button>

      <div class="mt-6 flex flex-col sm:flex-row items-center justify-center gap-2 text-sm text-gray-500">
        <span>클릭 시 카카오톡 앱으로 자동 연결됩니다.</span>
        <button id="testVoiceButton" class="text-green-400 hover:text-green-300 underline underline-offset-4">클로바 목소리 테스트</button>
      </div>
    </div>
  </main>

  <section class="bg-[#111827] flex-grow pt-14 pb-24 px-4 sm:px-6 lg:px-8 relative z-10">
    <div class="max-w-5xl mx-auto">
      <div class="flex items-center justify-center mb-12">
        <div class="w-16 h-px bg-gray-700"></div>
        <p class="text-center text-gray-400 text-sm md:text-base mx-4 font-medium uppercase tracking-widest">
          연결 문제 발생 시 해결 방법
        </p>
        <div class="w-16 h-px bg-gray-700"></div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 text-center">
        <div class="action-card p-6 cursor-pointer flex flex-col items-center justify-center min-h-[160px]" onclick="copyLink()">
          <div class="icon-container text-4xl mb-4"><i class="fa-solid fa-link"></i></div>
          <h3 class="text-gray-200 text-base font-semibold">링크 복사</h3>
          <p class="text-gray-500 text-xs mt-2">브라우저에 직접 붙여넣기</p>
        </div>

        <div class="action-card p-6 cursor-pointer flex flex-col items-center justify-center min-h-[160px]" onclick="showNotification('모바일 전송 기능은 실제 배포 후 연결 가능합니다.')">
          <div class="icon-container text-4xl mb-4 relative">
            <i class="fa-regular fa-comment-dots"></i>
            <i class="fa-solid fa-mobile-screen absolute text-sm -bottom-1 -right-2 text-[#111827] bg-gray-400 rounded-sm px-0.5"></i>
          </div>
          <h3 class="text-gray-200 text-base font-semibold">모바일 전송</h3>
          <p class="text-gray-500 text-xs mt-2">내 폰으로 링크 보내기</p>
        </div>

        <div class="action-card p-6 cursor-pointer flex flex-col items-center justify-center min-h-[160px]" onclick="showQRCode()">
          <div class="icon-container text-4xl mb-4"><i class="fa-solid fa-qrcode"></i></div>
          <h3 class="text-gray-200 text-base font-semibold">QR 스캔</h3>
          <p class="text-gray-500 text-xs mt-2">스마트폰 카메라로 스캔</p>
        </div>

        <div class="action-card p-6 cursor-pointer flex flex-col items-center justify-center min-h-[160px]" onclick="window.open('https://www.kakaocorp.com/page/service/service/KakaoTalk', '_blank')">
          <div class="icon-container text-4xl mb-4"><i class="fa-solid fa-desktop"></i></div>
          <h3 class="text-gray-200 text-base font-semibold">PC 카톡 설치</h3>
          <p class="text-gray-500 text-xs mt-2">PC버전 다운로드 페이지</p>
        </div>
      </div>
    </div>
  </section>

  <div id="toast" class="fixed bottom-8 left-1/2 bg-gray-800 border border-green-500/50 text-green-400 px-8 py-4 rounded-lg shadow-[0_0_15px_rgba(55,178,117,0.3)] opacity-0 pointer-events-none z-50 font-medium tracking-wide flex items-center gap-3 transition-all duration-300" style="transform: translate(-50%, 12px) scale(.98);">
    <i class="fa-solid fa-circle-check"></i>
    <span id="toastMessage">메시지 내용</span>
  </div>

  <div id="qrModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 opacity-0 pointer-events-none transition-all duration-300">
    <div class="bg-gray-900 border border-gray-700 p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300" id="qrModalContent">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-gray-100 flex items-center gap-2">
          <i class="fa-solid fa-qrcode text-green-500"></i> QR 코드 스캔
        </h2>
        <button onclick="closeQRCode()" class="text-gray-500 hover:text-white transition-colors focus:outline-none bg-gray-800 rounded-full w-8 h-8 flex items-center justify-center">
          <i class="fa-solid fa-times"></i>
        </button>
      </div>
      <div class="flex flex-col items-center">
        <div class="w-56 h-56 bg-white flex items-center justify-center rounded-xl mb-6 shadow-inner p-4">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://open.kakao.com/o/sNUOWLui" alt="QR Code" class="w-full h-full object-contain" onerror="this.outerHTML='<i class=\'fa-solid fa-qrcode text-6xl text-gray-800\'></i>'" />
        </div>
        <div class="bg-gray-800 rounded-lg p-4 w-full text-center border border-gray-700">
          <p class="text-sm text-gray-300 leading-relaxed">
            기본 카메라 앱 또는<br />카카오톡 <b>[더보기] &gt; [결제] &gt; [QR스캔]</b>을<br />이용해 주세요.
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const chatLink = "https://open.kakao.com/o/sNUOWLui";

    // 네이버 클로바 보이스에서 만든 음성 파일명
    // 배포할 때 이 HTML 파일과 같은 폴더에 clova-entry.mp3 파일을 같이 올리면 됨.
    const clovaVoiceFile = "clova-entry.mp3";


    function playClovaVoice() {
      // 네이버 클로바에서 만든 mp3 파일만 재생
      // index.html과 같은 폴더에 clova-entry.mp3가 있어야 정상 재생됨.
      const audio = new Audio(clovaVoiceFile);
      audio.volume = 1;

      audio.play().catch(() => {
        showNotification('캔버스 미리보기에서는 MP3 파일 연결이 안 될 수 있습니다. 배포 폴더에 clova-entry.mp3를 같이 올려주세요.');
      });
    }

    document.getElementById('joinButton').addEventListener('click', function () {
      showNotification('입장하셨습니다. 카카오톡으로 이동합니다.');
      playClovaVoice();
      setTimeout(() => window.open(chatLink, '_blank'), 850);
    });

    document.getElementById('testVoiceButton').addEventListener('click', function (event) {
      event.preventDefault();
      playClovaVoice();
      showNotification('목소리 테스트 중입니다.');
    });

    function copyLink() {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(chatLink)
          .then(() => showNotification('링크가 클립보드에 복사되었습니다.'))
          .catch(() => fallbackCopyTextToClipboard(chatLink));
      } else {
        fallbackCopyTextToClipboard(chatLink);
      }
    }

    function fallbackCopyTextToClipboard(text) {
      const tempInput = document.createElement('input');
      tempInput.value = text;
      tempInput.style.position = 'fixed';
      tempInput.style.left = '-9999px';
      document.body.appendChild(tempInput);
      tempInput.focus();
      tempInput.select();

      try {
        document.execCommand('copy');
        showNotification('링크가 클립보드에 복사되었습니다.');
      } catch (err) {
        showNotification('링크 복사에 실패했습니다.');
      } finally {
        document.body.removeChild(tempInput);
      }
    }

    let toastTimeout;
    function showNotification(message) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toastMessage');

      toastMsg.textContent = message;
      toast.classList.add('toast-show');

      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.remove('toast-show');
      }, 2800);
    }

    function showQRCode() {
      const modal = document.getElementById('qrModal');
      const modalContent = document.getElementById('qrModalContent');

      modal.classList.remove('opacity-0', 'pointer-events-none');
      setTimeout(() => {
        modalContent.classList.remove('scale-95');
        modalContent.classList.add('scale-100');
      }, 10);
    }

    function closeQRCode() {
      const modal = document.getElementById('qrModal');
      const modalContent = document.getElementById('qrModalContent');

      modalContent.classList.remove('scale-100');
      modalContent.classList.add('scale-95');

      setTimeout(() => {
        modal.classList.add('opacity-0', 'pointer-events-none');
      }, 300);
    }

    document.getElementById('qrModal').addEventListener('click', function (e) {
      if (e.target === this) closeQRCode();
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeQRCode();
    });
  </script>
</body>
</html>
